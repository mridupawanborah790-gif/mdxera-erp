    <style>
      :root {
        /* Tally Prime & Kwik-E-Mart Color Palette */
        --color-primary: #004242; 
        --color-primary-dark: #003333;
        --color-primary-light: #006666;
        --color-accent: #ffcc00; 
        --color-bg-app: #fdfdf5; /* Ivory Cream */
        --color-bg-card: #ffffff;
        --color-bg-sidebar: #0F4C5C; /* Deep Teal */
        --color-bg-sidebar-dark: #0A3B49; 
        --color-text-primary: #000000;
        --color-text-secondary: #333333;
        --color-border: #999999;
        --color-selection: #ffeb9c;
        
        --sidebar-width: 16rem;
        --quickkeys-width: 10rem;

        /* Light modal variables */
        --modal-header-bg-light: #004242;
        --modal-header-text-light: #FFFFFF;
        --modal-header-border-light: #003333;
        --modal-border-color-light: #004242;
        --modal-bg-light: #fdfdf5;
        --modal-content-bg-light: #ffffff;
        --modal-footer-bg-light: #f1f1f1;
        --modal-footer-border-light: #dddddd;

        /* Dark modal variables — defined here so dark: variants never go transparent */
        --modal-header-bg-dark: #004242;
        --modal-header-text-dark: #FFFFFF;
        --modal-header-border-dark: #003333;
        --modal-border-color-dark: #004242;
        --modal-bg-dark: #1e1e1e;
        --modal-content-bg-dark: #2a2a2a;
        --modal-footer-bg-dark: #1a1a1a;
        --modal-footer-border-dark: #3a3a3a;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--color-bg-app);
        color: var(--color-text-primary);
        font-size: 15px;
        overflow: hidden;
      }

      .tally-font-mono {
        font-family: 'Lucida Console', 'Roboto Mono', monospace;
      }

      .tally-border { border: 1px solid var(--color-border); }
      .tally-shadow { box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
      
      .tally-input {
        border: 1px solid var(--color-border);
        background: var(--color-bg-card);
        padding: 4px 8px;
        outline: none;
        color: #000;
        font-weight: 700;
        text-transform: uppercase;
      }
      .tally-input:focus {
        border-color: var(--color-primary);
        background-color: #fffde7;
        box-shadow: 0 0 0 2px rgba(0, 66, 66, 0.1);
      }

      .tally-button-primary {
        background-color: var(--color-primary);
        color: white;
        font-weight: 900;
        text-transform: uppercase;
        border: 1px solid var(--color-primary-dark);
        transition: all 0.1s;
      }
      .tally-button-primary:active { transform: translateY(2px); }
      
      .tally-button-accent {
        background-color: var(--color-accent);
        color: black;
        font-weight: 900;
        text-transform: uppercase;
        border: 1px solid #cca300;
      }

      .no-spinner::-webkit-outer-spin-button,
      .no-spinner::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>
<link rel="stylesheet" href="/src/index.css">
</head>
<body>
<!-- 
  Prevent OS/system dark mode from activating Tailwind's dark: variants.
  This app is intentionally light-mode only. The dark class must never be
  present on <html> unless explicitly set by the app itself.
-->
<script>document.documentElement.classList.remove('dark');</script>
<div id="root"></div>
<script type="module" src="/src/index.tsx"></script>
</body>
